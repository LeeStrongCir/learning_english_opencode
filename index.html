<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人教版小学英语课本</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-decoration">
    <div class="bubble bubble-1"></div>
    <div class="bubble bubble-2"></div>
    <div class="bubble bubble-3"></div>
    <div class="bubble bubble-4"></div>
    <div class="bubble bubble-5"></div>
    <div class="star star-1">⭐</div>
    <div class="star star-2">✨</div>
    <div class="star star-3">🌟</div>
    <div class="star star-4">💫</div>
    <div class="cloud cloud-1">☁️</div>
    <div class="cloud cloud-2">☁️</div>
    <div class="cloud cloud-3">☁️</div>
  </div>

  <header class="header">
    <div class="logo">
      <span class="logo-icon">📚</span>
      <h1>人教版小学英语</h1>
      <span class="logo-subtitle">PEP Primary English</span>
    </div>
    <nav class="nav">
      <button class="nav-btn active" data-view="home">首页</button>
      <button class="nav-btn" data-view="content">课本内容</button>
      <button class="nav-btn" data-view="about">关于</button>
    </nav>
  </header>

  <main class="main">
    <section class="home-view active" id="home-view">
      <div class="hero">
        <div class="hero-content">
          <h2 class="hero-title">欢迎来到英语学习乐园 🎉</h2>
          <p class="hero-desc">选择年级，开始你的英语学习之旅吧！</p>
          <div class="grade-selector">
            <h3 class="selector-title">选择年级</h3>
            <div class="grade-grid" id="grade-grid"></div>
          </div>
        </div>
        <div class="hero-illustration">
          <div class="illustration-card">
            <span class="illustration-emoji">🎒</span>
            <p>快乐学习</p>
          </div>
          <div class="illustration-card">
            <span class="illustration-emoji">🌈</span>
            <p>多彩英语</p>
          </div>
          <div class="illustration-card">
            <span class="illustration-emoji">🏆</span>
            <p>天天进步</p>
          </div>
        </div>
      </div>
    </section>

    <section class="content-view" id="content-view">
      <div class="breadcrumb" id="breadcrumb"></div>

      <div class="selection-panel" id="selection-panel">
        <div class="panel-card">
          <div class="panel-icon">📖</div>
          <h3>选择册次</h3>
          <div class="volume-selector" id="volume-selector"></div>
        </div>
        <div class="panel-card">
          <div class="panel-icon">📑</div>
          <h3>选择单元</h3>
          <div class="unit-selector" id="unit-selector"></div>
        </div>
      </div>

      <div class="content-display" id="content-display"></div>
    </section>

    <section class="about-view" id="about-view">
      <div class="about-card">
        <h2>关于本项目</h2>
        <p>这是一个展示人教版（PEP）小学英语课本内容的学习平台。</p>
        <p>涵盖三年级至六年级，上下册共8册教材内容。</p>
        <p>帮助学生轻松复习和预习英语知识！📝</p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>📚 人教版小学英语课本展示平台 | Made with 💖</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
