[pytest]
# 测试文件搜索路径
testpaths = tests

# 测试文件命名模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 命令行参数
addopts =
    -v
    --tb=short
    --strict-markers

# 自定义标记
markers =
    p0: P0 优先级测试用例（最高优先级）
    p1: P1 优先级测试用例
    p2: P2 优先级测试用例
    login: 登录功能测试
    security: 安全测试
    redirect: 跳转测试
    lockout: 账号锁定测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
